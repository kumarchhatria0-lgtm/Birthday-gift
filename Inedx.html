<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      overflow: hidden;
    }

    h1 {
      margin-top: 80px;
      font-size: 50px;
      color: white;
    }

    p {
      font-size: 20px;
      color: white;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 20px;
      background: white;
      color: #ff4b5c;
      cursor: pointer;
    }

    .heart {
      position: absolute;
      color: red;
      font-size: 20px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

<h1>🎉 Happy Birthday ❤️</h1>

<p>
Hey  <br><br>
You make everything feel better just by being there 💖 <br>
I hope your day is as amazing as you ✨
</p>

<button onclick="surprise()">Tap for Surprise 🎁</button>

<audio id="music" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
function surprise() {
  alert("Wish you Many Many Happy Returns Of The Day,Happy Birthday Butki ❤️😊");
}

// floating hearts
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
